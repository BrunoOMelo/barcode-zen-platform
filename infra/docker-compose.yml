services:
  postgres:
    image: postgres:16-alpine
    container_name: barcode-zen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-barcode_zen}
      POSTGRES_USER: ${POSTGRES_USER:-barcode_zen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barcode_zen}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-barcode_zen} -d ${POSTGRES_DB:-barcode_zen}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: barcode-zen-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-barcode_zen}:${POSTGRES_PASSWORD:-barcode_zen}@postgres:5432/${POSTGRES_DB:-barcode_zen}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
